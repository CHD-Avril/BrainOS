services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: brainos
      MYSQL_USER: brainos
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-brainos_dev}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root_dev}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  chroma:
    image: ghcr.io/chroma-core/chroma:1.0.0
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /data
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data
    healthcheck:
      test:
        - CMD
        - /usr/bin/bash
        - -ec
        - >-
          exec 3<>/dev/tcp/127.0.0.1/8000;
          printf 'GET /api/v2/heartbeat HTTP/1.0\r\nHost: localhost\r\n\r\n' >&3;
          IFS= read -r status <&3;
          [[ "$$status" == *" 200 "* ]]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  # 可选：托管前端 dist 并反向代理 /api 到后端。
  # 仅在需要时启动：docker compose --profile web up -d nginx
  # 启动前需先执行 frontend 构建生成 frontend/dist。
  nginx:
    image: nginx:1.27-alpine
    profiles: ["web"]
    ports:
      - "80:80"
    environment:
      # 后端上游地址。后端在宿主机运行时用 host.docker.internal；
      # 若后端也在 Compose 网络内，改为对应服务名，如 backend:8080。
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-host.docker.internal:8080}
    volumes:
      - ./deploy/nginx/templates:/etc/nginx/templates:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  chroma_data:
